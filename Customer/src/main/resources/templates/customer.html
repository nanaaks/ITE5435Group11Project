<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
	<h2>Project 2: Customer Info</h2>
	<form action="#" th:action="@{/StoringCustomerData}"
		th:object="${customer}" method="post">
		Customer ID (Must match a Web User Login ID): <input type="text"
			th:field="*{id}" required /><br /> Address: <input type="text"
			th:field="*{address}" required /><br /> Phone: <input type="text"
			th:field="*{phone}" required /><br /> Email: <input type="email"
			th:field="*{email}" required /><br />
		<button type="submit">Save Customer</button>
	</form>
</body>
</html>
